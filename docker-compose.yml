version: '3.8'

networks:
  relativ_mesh:
    driver: bridge

services:
  # Automated HTTPS Reverse Proxy
  caddy:
    image: caddy:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - relativ_mesh
    restart: unless-stopped

  # FastAPI Core Engine
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "9000:9000"
    environment:
      - DATABASE_URL=postgresql://relativ_admin:***@db:5432/relativ_db
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - BGUTIL_POT_BASE_URL=http://bgutil:4416
      - YT_PROXY=${YT_PROXY:-}
    depends_on:
      - db
      - bgutil
    volumes:
      - ./outputs:/app/outputs
      - ./temp:/app/temp
    networks:
      - relativ_mesh
    restart: unless-stopped

  # YouTube PO-token provider. Tiny HTTP server on :4416 that
  # yt-dlp's bgutil-ytdlp-pot-provider plugin calls per video to
  # bypass the 2025+ "Sign in to confirm" anti-bot wall.
  bgutil:
    image: brainicism/bgutil-ytdlp-pot-provider:latest
    init: true
    ports:
      - "4416:4416"
    networks:
      - relativ_mesh
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4416/ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Core Database Engine
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=relativ_admin
      - POSTGRES_PASSWORD=relativ_secure_pass
      - POSTGRES_DB=relativ_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - relativ_mesh
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
