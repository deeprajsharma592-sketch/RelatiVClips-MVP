version: '3.8'
networks:
  relativ_mesh:
    driver: bridge
services:
  caddy:
    image: caddy:latest
    ports:
    - 80:80
    - 443:443
    volumes:
    - ./Caddyfile:/etc/caddy/Caddyfile
    - caddy_data:/data
    - caddy_config:/config
    networks:
    - relativ_mesh
    restart: unless-stopped
  backend:
    image: relativ-backend:b8e
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
    - 9000:9000
    environment:
    - CHROMA_PERSIST_DIR=/app/chroma_data
    - CHROMA_PERSIST_DIR=/app/chroma_data
    depends_on:
    - db
    - bgutil
    volumes:
    - ./backend/pipeline:/app/backend/pipeline
    - ./backend/utils:/app/backend/utils
    - ./backend/routers:/app/backend/routers
    - ./backend/database:/app/backend/database
    - ./backend/taste:/app/backend/taste
    - ./outputs:/app/outputs
    - ./temp:/app/temp
    - ./cache:/app/cache
    - ./cookies.txt:/app/cookies.txt
    - ./chroma_data:/app/chroma_data
    networks:
    - relativ_mesh
    restart: unless-stopped
  bgutil:
    image: brainicism/bgutil-ytdlp-pot-provider:latest
    init: true
    ports:
    - 4416:4416
    networks:
    - relativ_mesh
    restart: unless-stopped
    healthcheck:
      test:
      - CMD
      - node
      - -e
      - 'require(''http'').get(''http://127.0.0.1:4416/ping'', r => process.exit(r.statusCode
        === 200 ? 0 : 1)).on(''error'', () => process.exit(1))'
      interval: 30s
      timeout: 5s
      retries: 3
  db:
    image: postgres:15-alpine
    environment:
    - POSTGRES_USER=relativ_admin
    - POSTGRES_PASSWORD=relativ_secure_pass
    - POSTGRES_DB=relativ_db
    volumes:
    - postgres_data:/var/lib/postgresql/data
    networks:
    - relativ_mesh
    restart: unless-stopped
volumes:
  caddy_data: null
  caddy_config: null
  postgres_data: null
