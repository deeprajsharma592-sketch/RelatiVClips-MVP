<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
</head>
<body style="margin:0; padding:0; background:#F6F1E7; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; color:#1A1814;">
  <!-- Outer wrapper -->
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#F6F1E7; padding:32px 16px;">
    <tr>
      <td align="center">
        <!-- Email container -->
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0" style="max-width:600px; background:#FFFFFF; border-radius:18px; overflow:hidden; box-shadow:0 4px 24px rgba(140,110,60,0.08); border:1px solid rgba(60,50,30,0.08);">
          <!-- Header with brand -->
          <tr>
            <td style="padding:32px 40px; background:linear-gradient(135deg, rgba(251,113,133,0.08) 0%, rgba(217,70,239,0.08) 50%, rgba(139,92,246,0.08) 100%); border-bottom:1px solid rgba(60,50,30,0.08);">
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td>
                    <span style="display:inline-block; vertical-align:middle;">
                      <span style="display:inline-block; width:40px; height:40px; border-radius:11px; background:linear-gradient(135deg, #FB7185 0%, #D946EF 50%, #8B5CF6 100%); box-shadow:0 4px 12px rgba(217,70,239,0.30); text-align:center; line-height:40px; color:#FFFFFF; font-weight:700; font-size:20px; font-family:'Space Grotesk',-apple-system,sans-serif;">R</span>
                    </span>
                    <span style="display:inline-block; vertical-align:middle; margin-left:12px; font-family:'Space Grotesk',-apple-system,sans-serif; font-size:20px; font-weight:600; color:#1A1814;">
                      Relati<span style="background:linear-gradient(135deg, #FB7185 0%, #D946EF 50%, #8B5CF6 100%); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; color:transparent;">V</span>
                    </span>
                  </td>
                  <td align="right" style="font-family:'JetBrains Mono',monospace; font-size:11px; color:#8B8472; text-transform:uppercase; letter-spacing:0.1em;">
                    {{KIND}}
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="padding:40px;">
              <h1 style="font-family:'Space Grotesk',-apple-system,sans-serif; font-size:28px; font-weight:600; letter-spacing:-0.025em; line-height:1.15; margin:0 0 16px; color:#1A1814;">
                {{HEADLINE}}
              </h1>
              <p style="font-size:15px; line-height:1.6; margin:0 0 24px; color:#4D4639;">
                {{BODY}}
              </p>
              {{CTA_BLOCK}}
              {{SECONDARY_BLOCK}}
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="padding:24px 40px; background:rgba(40,30,15,0.02); border-top:1px solid rgba(60,50,30,0.08);">
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td style="font-family:'JetBrains Mono',monospace; font-size:11px; color:#8B8472; line-height:1.6;">
                    80 Galaxy Media · Built in Assam, India, deployed globally
                    <br>
                    <a href="https://relativclips.com" style="color:#D946EF; text-decoration:none;">relativclips.com</a>
                    &nbsp;·&nbsp;
                    <a href="{{UNSUBSCRIBE_URL}}" style="color:#8B8472; text-decoration:underline;">Unsubscribe</a>
                  </td>
                  <td align="right" style="font-family:'JetBrains Mono',monospace; font-size:10px; color:#B8B2A0;">
                    v2.0 · {{SENT_AT}}
                  </td>
                </tr>
              </table>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
