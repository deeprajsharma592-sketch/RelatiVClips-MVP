<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New campaign matches you</title>
</head>
<body style="margin:0; padding:0; background:#F6F1E7; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; color:#1A1814;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#F6F1E7; padding:32px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0" style="max-width:600px; background:#FFFFFF; border-radius:18px; overflow:hidden; box-shadow:0 4px 24px rgba(140,110,60,0.08); border:1px solid rgba(60,50,30,0.08);">
          <tr>
            <td style="padding:32px 40px; background:linear-gradient(135deg, rgba(139,92,246,0.10) 0%, rgba(217,70,239,0.08) 50%, rgba(236,72,153,0.08) 100%); border-bottom:1px solid rgba(60,50,30,0.08);">
              <span style="display:inline-block; width:40px; height:40px; border-radius:11px; background:linear-gradient(135deg, #FB7185 0%, #D946EF 50%, #8B5CF6 100%); box-shadow:0 4px 12px rgba(217,70,239,0.30); text-align:center; line-height:40px; color:#FFFFFF; font-weight:700; font-size:20px; font-family:'Space Grotesk',-apple-system,sans-serif; vertical-align:middle;">R</span>
              <span style="display:inline-block; vertical-align:middle; margin-left:12px; font-family:'Space Grotesk',-apple-system,sans-serif; font-size:20px; font-weight:600; color:#1A1814;">
                Relati<span style="background:linear-gradient(135deg, #FB7185 0%, #D946EF 50%, #8B5CF6 100%); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; color:transparent;">V</span>
              </span>
              <div style="margin-top:12px; font-family:'JetBrains Mono',monospace; font-size:11px; color:#8B8472; text-transform:uppercase; letter-spacing:0.1em;">
                NEW CAMPAIGN
              </div>
            </td>
          </tr>
          <tr>
            <td style="padding:40px;">
              <h1 style="font-family:'Space Grotesk',-apple-system,sans-serif; font-size:26px; font-weight:600; letter-spacing:-0.025em; line-height:1.15; margin:0 0 8px; color:#1A1814;">
                {{BRAND_NAME}} has a slot for you
              </h1>
              <p style="font-size:13px; color:#8B8472; margin:0 0 24px; font-family:'JetBrains Mono',monospace;">
                {{VERTICAL}} · {{PLATFORMS}}
              </p>

              <!-- Brief card -->
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background:rgba(40,30,15,0.03); border:1px solid rgba(60,50,30,0.08); border-radius:14px; margin:0 0 16px;">
                <tr>
                  <td style="padding:20px 24px;">
                    <p style="font-size:14px; line-height:1.6; margin:0 0 16px; color:#1A1814;">
                      {{BRIEF}}
                    </p>
                    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
                      <tr>
                        <td style="font-family:'JetBrains Mono',monospace; font-size:11px; color:#8B8472; text-transform:uppercase; letter-spacing:0.1em;">CPM</td>
                        <td align="right" style="font-family:'Space Grotesk',sans-serif; font-size:18px; font-weight:600; color:#D946EF;">${{CPM}}</td>
                      </tr>
                      <tr><td colspan="2" style="height:8px;"></td></tr>
                      <tr>
                        <td style="font-family:'JetBrains Mono',monospace; font-size:11px; color:#8B8472; text-transform:uppercase; letter-spacing:0.1em;">Slots</td>
                        <td align="right" style="font-family:'JetBrains Mono',monospace; font-size:13px; color:#1A1814;">{{FILLED}} / {{SLOTS}}</td>
                      </tr>
                      <tr><td colspan="2" style="height:8px;"></td></tr>
                      <tr>
                        <td style="font-family:'JetBrains Mono',monospace; font-size:11px; color:#8B8472; text-transform:uppercase; letter-spacing:0.1em;">Apply by</td>
                        <td align="right" style="font-family:'JetBrains Mono',monospace; font-size:13px; color:#1A1814;">{{DEADLINE}}</td>
                      </tr>
                    </table>
                  </td>
                </tr>
              </table>

              <!-- CTA -->
              <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="margin:0 auto;">
                <tr>
                  <td style="background:linear-gradient(135deg, #FB7185 0%, #D946EF 50%, #8B5CF6 100%); border-radius:9999px; box-shadow:0 4px 12px rgba(217,70,239,0.30);">
                    <a href="https://relativclips.com/clippers/apply" style="display:inline-block; padding:14px 32px; color:#FFFFFF; text-decoration:none; font-weight:600; font-size:15px; font-family:'Space Grotesk',-apple-system,sans-serif;">Apply for this slot →</a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <tr>
            <td style="padding:24px 40px; background:rgba(40,30,15,0.02); border-top:1px solid rgba(60,50,30,0.08);">
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td style="font-family:'JetBrains Mono',monospace; font-size:11px; color:#8B8472; line-height:1.6;">
                    RelatiV Labs · clipper network
                  </td>
                  <td align="right" style="font-family:'JetBrains Mono',monospace; font-size:10px; color:#B8B2A0;">
                    <a href="https://relativclips.com/campaigns" style="color:#8B8472; text-decoration:underline;">All campaigns</a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
